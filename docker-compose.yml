version: '3.8'

services:
  # ==========================================
  # 1. INFRASTRUCTURE LAYER
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password # Change this for production
    ports:
      - "3306:3306"
    volumes:
      # This maps your infrastructure folder script to automatically run on boot
      - ./infrastructure/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ecommerce-net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin
    depends_on:
      - mysql
    environment:
      # This tells phpMyAdmin exactly which container has the database
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      # We use 8081 because your api-gateway is already using 8080
      - "8081:80"
    networks:
      - ecommerce-net

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - ecommerce-net

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - ecommerce-net

  # ==========================================
  # 2. PLATFORM LAYER
  # ==========================================
  eureka-server:
    build:
      context: ./platform/eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - ecommerce-net

  config-server:
    build:
      context: ./platform/config-server
    container_name: config-server
    depends_on:
      - eureka-server
    ports:
      - "8888:8888"
    networks:
      - ecommerce-net

  api-gateway:
    build:
      context: ./platform/api-gateway
    container_name: api-gateway
    depends_on:
      - eureka-server
      - config-server
    ports:
      - "8080:8080"
    networks:
      - ecommerce-net

  # ==========================================
  # 3. BUSINESS SERVICES LAYER
  # ==========================================
  auth-service:
    build:
      context: ./services/auth-service
    container_name: auth-service
    depends_on:
      - mysql
      - redis
      - eureka-server
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - ecommerce-net

  product-service:
    build:
      context: ./services/product-service
    container_name: product-service
    depends_on:
      - mysql
      - kafka
      - eureka-server
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - ecommerce-net

# Define a shared network for container communication
networks:
  ecommerce-net:
    driver: bridge